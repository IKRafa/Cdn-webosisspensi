<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kegiatan & Berita - OSIS SPENSI</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

</head>
<body>

    <!-- Navigation Bar -->
    <div id="header-placeholder"></div>

    <!-- Hero / Page Header -->
    <section class="kegiatan-hero">
        <div class="kegiatan-hero-bg" id="hero-bg"></div>
        <div class="kegiatan-hero-overlay"></div>
        
        <div class="kegiatan-hero-content">
            <div class="kegiatan-badge">
                <div class="badge-dot"></div>
                <span id="hero-badge-text">Berita Sekolah</span>
            </div>
            <h1 class="kegiatan-title-main" id="hero-title">Berita Sekolah</h1>
            <p class="kegiatan-subtitle" id="hero-subtitle">Kumpulan kegiatan dan event terbaru dari SMPN 7 Mengwi</p>

            <!-- TABS -->
            <div class="kegiatan-tabs">
                <button class="tab-pill active" id="tab-beritasekolah">Berita Sekolah</button>
                <button class="tab-pill " id="tab-beritaosis">Berita Osis</button>
            </div>
        </div>
    </section>

    <!-- Main Content -->
    <section class="kegiatan-content">
        <div class="kegiatan-list" id="kegiatan-list">
            <!-- Items will be rendered dynamically by JS -->
        </div>
    </section>

    <!-- CTA: Ikuti Kami -->
    <section class="cta-section">
        <!-- Dynamic Background Video Grid -->
        <div class="cta-bg-grid" id="cta-bg-grid"></div>
        <div class="cta-bg-overlay"></div>
        <!-- Floating Particles -->
        <div class="cta-particles">
            <div class="cta-particle"></div>
            <div class="cta-particle"></div>
            <div class="cta-particle"></div>
            <div class="cta-particle"></div>
            <div class="cta-particle"></div>
            <div class="cta-particle"></div>
            <div class="cta-particle"></div>
            <div class="cta-particle"></div>
        </div>

        <div class="cta-card reveal">
            <div class="cta-icon">
                <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
            </div>
            <h2>Ikuti Kami!</h2>
            <p class="cta-subtitle">Jangan ketinggalan informasi dan kegiatan terbaru dari OSIS SPENSI. Ikuti akun media sosial kami!</p>
            
            <div class="cta-socials">
                <a href="https://www.instagram.com/osisspensi_" target="_blank" class="cta-social-btn instagram">
                    <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
                    @osisspensi_
                </a>
                <a href="https://www.instagram.com/smpn7mengwi" target="_blank" class="cta-social-btn instagram">
                    <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
                    @smpn7mengwi
                </a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/gh/IKRafa/Cdn-webosisspensi@main/global/js/global.js"></script>
